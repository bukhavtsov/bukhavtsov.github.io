export default "<form class=\" text-center border-light p-5 form-horizontal\" [formGroup]=\"addForm\" (ngSubmit)=\"addNews(addForm.value)\">\n    <h1 class=\"h3 mb-3 font-weight-normal\" style=\"text-align: center\">Add News</h1>\n    <input class=\"form-control mb-4\" id=\"title\" type=\"text\" formControlName=\"title\" placeholder=\"Title\" required=\"\"\n        autofocus=\"\">\n    <input class=\"form-control mb-4\" id=\"image\" type=\"text\" formControlName=\"image\" placeholder=\"Image url\" required=\"\"\n        autofocus=\"\">\n    <input class=\"form-control mb-4\" id=\"type\" type=\"text\" formControlName=\"type\" placeholder=\"Type\" required=\"\"\n        autofocus=\"\">\n    <textarea rows=\"8\" class=\"form-control mb-4\" id=\"text\" type=\"text\" formControlName=\"text\"\n        placeholder=\"Text...\"></textarea>\n    <input class=\"form-control mb-4\" id=\"date\" type=\"date\" formControlName=\"date\">\n    <button class=\"btn btn-lg btn-dark btn-block mb-4\" type=\"submit\">Create</button>\n\n</form>"
