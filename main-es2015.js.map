export default "<nav class=\"navbar navbar-expand-lg navbar-light bg-light\">\n  <button class=\"navbar-toggler\" type=\"button\" data-toggle=\"collapse\" data-target=\"#navbarTogglerDemo01\"\n    aria-controls=\"navbarTogglerDemo01\" aria-expanded=\"true\" aria-label=\"Toggle navigation\">\n    <span class=\"navbar-toggler-icon\"></span>\n  </button>\n  <div class=\"collapse navbar-collapse \" id=\"navbarTogglerDemo01\">\n    <ul class=\"navbar-nav\">\n      <li class=\"p-2\">\n        <select class=\"custom-select\" (change)=\"this.changeNewsSource($event.target.value)\">\n          <option selected>Local</option>\n          <option value=\" BBC\">BBC</option>\n          <option value=\"Google\">Google news</option>    \n        </select>\n      </li>\n      \n      <li class=\"p-2\">\n        <form class=\"form-inline\" [formGroup]=\"searchForm\" (ngSubmit)=\"submitSearch(searchForm.value)\">\n          <input class=\"form-control mr-sm-2\" id=\"title\" type=\"text\" formControlName=\"title\"\n            placeholder=\"Filter Title...\" required=\"\" autofocus=\"\">\n          <button class=\"btn btn-outline-danger my-2 my-sm-0\" type=\"submit\">Filter</button>\n        </form>\n      </li>\n      <li class=\"pl-5 pt-3\">\n        <input class=\"form-check-input\" type=\"checkbox\" value=\"\" id=\"defaultCheck1\">\n        <label class=\"form-check-label text-dark\" for=\"defaultCheck1\">\n          only created by me\n        </label>\n      </li>\n    </ul>\n    <form class=\"ml-auto\">\n      <button [routerLink]=\"['/news/add']\" routerLinkActive=\"router-link-active\" class=\"btn btn-outline-danger\"\n        type=\"submit\">Add Article</button>\n    </form>\n  </div>\n</nav>"
