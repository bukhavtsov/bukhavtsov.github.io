export default "<h1 class=\"text-center\">{{this.news.title}}</h1>\n\n<div class=\"d-flex justify-content-center\">\n    <img src=\"{{this.news.image}}\" class=\"img-fluid rounded col-lg-8\">\n</div>\n<div class=\"blog-main\">\n    <div class=\"blog-post\">\n        <p class=\"blog-post-meta\">{{this.news.date | date}}</p>\n        {{this.news.text}}\n    </div>\n\n</div>"
