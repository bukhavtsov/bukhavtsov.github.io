export default "<header class=\"sticky-top text-white\">\n  <nav class=\"navbar bg-danger\">\n    <a class=\"navbar-brand text-light\" [routerLink]=\"['/news']\">\n      <img src=\"assets/images/newspaper.png\" width=\"30\" height=\"30\" class=\"d-inline-block align-top inverted\" alt=\"\">\n      NEWS\n    </a>\n    <form class=\"form-inline my-2 \">\n      <p class=\"my-2 my-sm-0 px-3\">\n        <img src=\"https://cdn.jsdelivr.net/npm/bootstrap-icons/icons/person-fill.svg\" class=\"inverted\" width=\"30\"\n          height=\"30\" alt=\"\">\n        User</p>\n      <button class=\"btn btn-danger active my-2 my-sm-0\" type=\"submit\">Log out</button>\n    </form>\n  </nav>\n  <nav class=\"navbar navbar-expand-lg navbar-dark bg-dark\">\n    <div class=\"mx-auto\">\n      <h2>{{this.newsSource}}</h2>\n    </div>\n  </nav>\n  <app-admin-panel (newsSource)='receiveNewsSource($event)'></app-admin-panel>\n</header>"
