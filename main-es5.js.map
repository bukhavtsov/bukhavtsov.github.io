export default "<div *ngIf=\"!this.hideNewsList\">\n    <div *ngFor=\"let news of this.svcNews.getNewsList() | newsFilter:search\" class=\"row p-2\">\n        <div class=\"col-sm-4\">\n            <a [routerLink]=\"['/news', news.id]\" routerLinkActive=\"\"><img class=\"img-thumbnail\"\n                    src=\"{{news.image}}\"></a>\n        </div>\n        <div class=\"col-sm-4\">\n            <div class=\"module\">\n                <h5>{{news.title}}</h5>\n                <p class=\"collapse \" id=\"collapse{{news.id}}\" aria-expanded=\"false\">\n                    {{news.text}}\n                </p>\n                <a role=\"button\" class=\"collapsed\" data-toggle=\"collapse\" href=\"#collapse{{news.id}}\"\n                    aria-expanded=\"false\" aria-controls=\"collapse{{news.id}}\"></a>\n            </div>\n        </div>\n        <div class=\"col-sm-2 small\">{{news.date}}</div>\n        <div class=\"col-sm-2\">\n            <button [routerLink]=\"['/news/edit', news.id]\" type=\"button\"\n                class=\"btn btn-secondary btn-sm btn-block\">Edit</button>\n            <button (click)=\"this.svcNews.remove(news.id)\" type=\"button\"\n                class=\"btn btn-danger btn-sm btn-block\">Delete</button>\n        </div>\n    </div>\n</div>"
